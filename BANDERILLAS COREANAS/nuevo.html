<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banderillas Coreanas</title>
<link rel="stylesheet" href="estilo.css">
 <link rel="icon" type="image/png" href="Logo banderillas.png">
<style>
body{
font-family: Arial, Helvetica, sans-serif;
background:#e5e5e5;
margin:0;
}

.contenedor{
display:flex;
justify-content:center;
gap:60px;
padding:40px;
}

/* TARJETA */
.tarjeta{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
width: 300px;
}

.tarjeta img{
width:100%;
border-radius:10px;
}

/* FORMULARIO */
.pedido{
width:350px;
}

.pedido h2{
color:#ca2d8b;
}

.sabores{
display:flex;
gap:10px;
margin:10px 0;
}

.sabores img{
width:90px;
border-radius:5px;
}

label{
display:block;
margin-top:10px;
}

input, select{
width:100%;
padding:8px;
margin-top:5px;
border:1px solid #f08dcc;
border-radius:3px;
}

button{
margin-top:15px;
width:100%;
padding:10px;
background:#e01283;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#f681b7;
}
</style>
</head>
<body>

<div class="contenedor">


<div class="tarjeta">
<h2>Korean Food</h2>


<img src="op2.jpg">

</div>


<div class="pedido">

    <h1>"Korean Food"</h1>
    <p></p>
<form id="miFormulario">

<h2>Realiza tu pedido</h2>
<p>Todas las banderillas a $50.00</p>

<div class="sabores">
<img src="panco.jpeg">
<img src="ramen.jpeg">
<img src="papa.jpeg">
<img src="flamin.jpeg">
</div>

<label>Banderilla</label>
<select>
<option>Clásica</option>
<option>Ramen</option>
<option>Papa crunch</option>
<option>Flamin hot</option>
</select>


    <label for="Banderilla"> Banderilla</label>
    <input type="banderilla"  id="Banderilla" name="Banderilla" required>

     <label for="Nombres"> Nombres</label>
    <input type="text"  id="Nombres" name="Nombres" required>

    <label for="Telefono"> Tel&eacute;fono</label>
    <input type="tel" id="Telefono" name="Telefono" required>

    <label for="Direccion"> direcci&oacute;n</label>
    <input type="direccion" id="Direccion"  name="Direccion" required>
   
    <button type="submit"> Enviar </button>
 </form>
 
 <p class="mensaje" id="mensaje"></p>


<script>

const url = "https://script.google.com/macros/s/AKfycbwkdB19w7zLbLoJBYamd4um_dEa-KvUMh_S1NuexVMAJYrKm1CUOL5KMQbOgkWgpESwaw/exec";

document.getElementById("miFormulario") 
.addEventListener("submit", function(e){

    e.preventDefault();

    const datos = {
        banderilla: document.getElementById("Banderilla").value,
        nombres: document.getElementById("Nombres").value,
        telefono: document.getElementById("Telefono").value,
        direccion: document.getElementById("Direccion").value,

    };

    fetch(url, {
        method: "POST",
        body: JSON.stringify(datos)
    })

    .then(res => res.json())
    .then(data => {
    document.getElementById("mensaje").innerHTML =
        "Datos guardados correctamente ✔️";
    document.getElementById("miFormulario").reset();
    })
    .catch(error => {
    document.getElementById("mensaje").innerHTML =
        "Error al guardar ❌";
    });

})

</script>

</div>

</div>

</body>
</html>
